name: تحديث تاسي اليومي

on:
  schedule:
    - cron: '30 13 * * 0-4'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: تثبيت المتطلبات
        run: pip install -r requirements.txt

      - name: تشغيل التحليل وإرسال الإشعارات
        env:
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          EMAIL_FROM:       ${{ secrets.EMAIL_FROM }}
          EMAIL_TO:         ${{ secrets.EMAIL_TO }}
          EMAIL_PASSWORD:   ${{ secrets.EMAIL_PASSWORD }}
        run: python tasi_smart_score.py

      - name: حفظ قاعدة البيانات
        run: |
          git config user.name "tasi-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/tasi_scores.db || true
          git diff --quiet --cached || git commit -m "تحديث تلقائي $(date -u +'%Y-%m-%d')"
          git push || true
